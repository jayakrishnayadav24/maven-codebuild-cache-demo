AWSTemplateFormatVersion: '2010-09-09'
Description: CodePipeline + CodeBuild with Maven S3 cache for maven-codebuild-cache-demo

Parameters:
  GitHubOwner:
    Type: String
    Default: jayakrishnayadav24

  GitHubRepo:
    Type: String
    Default: maven-codebuild-cache-demo

  GitHubBranch:
    Type: String
    Default: main

  GitHubConnectionArn:
    Type: String
    Default: arn:aws:codeconnections:us-east-1:863570158116:connection/4af6db6c-6c65-4484-874f-5dbf9f9ba836

Resources:

  # ---------- S3 Buckets ----------
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "maven-demo-artifacts-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  CacheBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "maven-demo-cache-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: ExpireMavenCache
            Status: Enabled
            Prefix: maven-cache/
            ExpirationInDays: 30

  # ---------- IAM Roles ----------
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: maven-demo-codebuild-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetObjectVersion
                Resource:
                  - !Sub "arn:aws:s3:::maven-demo-artifacts-${AWS::AccountId}/*"
                  - !Sub "arn:aws:s3:::maven-demo-cache-${AWS::AccountId}/*"

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: maven-demo-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub "arn:aws:s3:::maven-demo-artifacts-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::maven-demo-artifacts-${AWS::AccountId}/*"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn

  # ---------- CodeBuild Project ----------
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: maven-codebuild-cache-demo
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/standard:7.0
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Cache:
        Type: S3
        Location: !Sub "maven-demo-cache-${AWS::AccountId}/maven-cache/production-app"
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/maven-codebuild-cache-demo

  # ---------- CodePipeline ----------
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: maven-codebuild-cache-demo-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:

        - Name: Source
          Actions:
            - Name: GitHub_Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceOutput

        - Name: Build
          Actions:
            - Name: Maven_Build
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput

Outputs:
  PipelineURL:
    Description: CodePipeline Console URL
    Value: !Sub "https://console.aws.amazon.com/codesuite/codepipeline/pipelines/maven-codebuild-cache-demo-pipeline/view?region=${AWS::Region}"

  ArtifactBucket:
    Description: S3 bucket storing build artifacts
    Value: !Ref ArtifactBucket

  CacheBucket:
    Description: S3 bucket storing Maven dependency cache
    Value: !Ref CacheBucket
